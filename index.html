<body>

<div class="container">

<!-- PAINEL -->
<div class="panel">

<h2>GERADOR DE REPERTÓRIO</h2>
<div style="display:flex;gap:6px;margin-top:15px;">
    <button class="slot-btn" onclick="carregarSlot(0)">1</button>
    <button class="slot-btn" onclick="carregarSlot(1)">2</button>
    <button class="slot-btn" onclick="carregarSlot(2)">3</button>
    <button class="slot-btn" onclick="carregarSlot(3)">4</button>
    <button class="slot-btn" onclick="carregarSlot(4)">5</button>

    <button class="slot-btn" onclick="verCartaz()">🔍</button>

<select id="grupo">
<option>AVV</option>
<option>Avv</option>

</select>

<!-- PRIMEIRA PARTE -->

OFERTA

<div>

    <div class="section-title">PRIMEIRA PARTE</div>

<script>

const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

function addMusica(secao){

const div = document.createElement("div");

div.className = "music-block";

div.innerHTML = `
<input class="nome" placeholder="Nome da Música" list="musicasSalvas">
<input class="autor" placeholder="Autor">
<input class="tom" placeholder="Tom">
<input class="youtubeLink" placeholder="Link YouTube">
`;

document.getElementById(secao).appendChild(div);

}

addMusica('primeiraInputs');
addMusica('ofertaInputs');
addMusica('entregaInputs');
addMusica('distribuicaoInputs');
addMusica('ceiaInputs');

async function baixarPNG(){

    const grupo = document.getElementById("grupo").value;
    const dia = document.getElementById("dia").value || new Date().getDate();

    const nomeArquivo = `${grupo} repertorio dia ${dia}.png`;

    const element =
        document.querySelector(".poster-area #poster");

    const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true,
        backgroundColor: null
    });

    canvas.toBlob((blob) => {

        const link = document.createElement("a");

        link.download = nomeArquivo;
        link.href = URL.createObjectURL(blob);

        link.click();

    }, "image/png");

}

function gerarCartaz(){

const hoje = new Date();

document.getElementById("posterGrupo").innerText =
document.getElementById("grupo").value;

document.getElementById("posterDia").innerText =
document.getElementById("dia").value || hoje.getDate();

document.getElementById("posterData").innerText =
meses[hoje.getMonth()] + " " + hoje.getFullYear();

gerarSecao(
    "primeiraInputs",
    "posterPrimeira",
    "secaoPrimeira"
);

gerarSecao(
    "ofertaInputs",
    "posterOferta",
    "secaoOferta"
);

gerarSecao(
    "entregaInputs",
    "posterEntrega",
    "secaoEntrega"
);

gerarSecao(
    "distribuicaoInputs",
    "posterDistribuicao",
    "secaoDistribuicao"
);

gerarSecao(
    "ceiaInputs",
    "posterCeia",
    "secaoCeia"
);

const extraTitulo =
    document.getElementById("extraTitulo").value;

const extraTexto =
    document.getElementById("extraTexto").value;

document.getElementById("posterExtraTitulo").innerText =
    extraTitulo;

document.getElementById("posterExtraTexto").innerText =
    extraTexto;

document.getElementById("secaoExtra").style.display =
    (extraTitulo.trim() || extraTexto.trim())
    ? "block"
    : "none";

salvarRepertorioAtual();

}

function toggleSecao(id){

    const secao =
        document.getElementById(id);

    if(secao.style.display === "block"){

        secao.style.display = "none";

    }else{

        secao.style.display = "block";

    }

}

function verCartaz(){

    atualizarPoster();

    const original =
        document.getElementById("poster");

    const clone =
        original.cloneNode(true);

    clone.id = "posterPreview";

    document.getElementById("previewContent").innerHTML = "";

    document.getElementById("previewContent")
        .appendChild(clone);

    document.getElementById("previewModal").style.display =
        "block";
}

function fecharPreview(){

    document.getElementById("previewModal").style.display =
        "none";
}
function gerarSecao(inputId, posterId, secaoId){

    const inputs =
        document.querySelectorAll(`#${inputId} .music-block`);

    const poster =
        document.getElementById(posterId);

    const secao =
        document.getElementById(secaoId);

    poster.innerHTML = "";

    let possuiMusica = false;

    inputs.forEach(item => {

        const nome =
            item.querySelector(".nome").value;

        const autor =
            item.querySelector(".autor").value;

        const tom =
            item.querySelector(".tom").value;

        const link =
            item.querySelector(".youtubeLink").value;

        if(nome.trim() !== ""){

            possuiMusica = true;

            salvarMusica({
                nome,
                autor,
                tom,
                youtube: link
            });

            poster.innerHTML += `
            ${link ? `
            <a class="song song-link" href="${link}" target="_blank">
            ` : `
            <div class="song">
            `}

            <div class="song-name">${nome}</div>

            <div class="song-meta">
                ${autor} • Tom ${tom}
            </div>

            ${link ? `
            <div class="yt-icon">▶</div>
            ` : ""}

            ${link ? `</a>` : `</div>`}
            `;
        }

    });

    secao.style.display =
        possuiMusica ? "block" : "none";
}

async function compartilharPNG(){

    const grupo = document.getElementById("grupo").value;
    const dia = document.getElementById("dia").value || new Date().getDate();
    const nomeArquivo = `${grupo} repertorio dia ${dia}.png`;

    const element =
    document.querySelector(".poster-area #poster");
    const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true,
        backgroundColor: null
    });

    canvas.toBlob(async (blob) => {

        const file = new File([blob], nomeArquivo, { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {

            await navigator.share({
                title: "Repertório",
                text: "Confira o repertório",
                files: [file]
            });

        } else {

            const link = document.createElement("a");
            link.download = nomeArquivo;
            link.href = URL.createObjectURL(blob);
            link.click();
        }

    }, "image/png");
}
async function compartilharPDF() {

    const grupo = document.getElementById("grupo").value;
    const dia = document.getElementById("dia").value || new Date().getDate();
    const nomeArquivo = `${grupo} repertorio dia ${dia}.pdf`;

    const element =
    document.querySelector(".poster-area #poster");

    const opt = {
        margin: 0,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 3,
            useCORS: true,
            scrollY: 0,
            windowWidth: element.scrollWidth,
            windowHeight: element.scrollHeight
        },
        jsPDF: {
            unit: 'px',
            format: [900, element.scrollHeight],
            orientation: 'portrait'
        }
    };

    const worker = html2pdf().set(opt).from(element).toPdf();

    const pdf = await worker.get("pdf");
    const blob = pdf.output("blob");

    const file = new File([blob], nomeArquivo, { type: "application/pdf" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {

        await navigator.share({
            title: "Repertório",
            text: "Confira o repertório em PDF",
            files: [file]
        });

    } else {

        pdf.save(nomeArquivo);
    }
}
function baixarPDF(){

    const grupo = document.getElementById("grupo").value;
    const dia = document.getElementById("dia").value || new Date().getDate();

    const element = document.getElementById("poster");

    const opt = {
        margin: 0,
        filename: `${grupo}repertorio dia ${dia}.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 3,
            useCORS: true,
            scrollY: 0,
            windowWidth: element.scrollWidth,
            windowHeight: element.scrollHeight
        },
        jsPDF: {
            unit: 'px',
            format: [900, element.scrollHeight], // <- chave do problema resolvida aqui
            orientation: 'portrait'
        }
    };

    html2pdf().set(opt).from(element).save();
}
// ==========================
// BIBLIOTECA DE MUSICAS
// ==========================

function pegarBiblioteca(){

    return JSON.parse(
        localStorage.getItem("bibliotecaMusicas")
    ) || [];

}

function salvarBiblioteca(lista){

    localStorage.setItem(
        "bibliotecaMusicas",
        JSON.stringify(lista)
    );

}

function atualizarDatalist(){

    const datalist =
        document.getElementById("musicasSalvas");

    const biblioteca = pegarBiblioteca();

    datalist.innerHTML = "";

    biblioteca.forEach(musica => {

        const option =
            document.createElement("option");

        option.value = musica.nome;

        option.label =
            musica.nome + " - " + musica.autor;

        datalist.appendChild(option);

    });

}

function salvarMusica(musica){

    let biblioteca = pegarBiblioteca();

    const existe = biblioteca.find(m =>
        m.nome.toLowerCase() ===
        musica.nome.toLowerCase()
    );

    if(!existe){

        biblioteca.push(musica);

        salvarBiblioteca(biblioteca);

        atualizarDatalist();

    }

}

// ==========================
// AUTOCOMPLETE
// ==========================

document.addEventListener("input", function(e){

    if(e.target.classList.contains("nome")){

        const nomeDigitado =
            e.target.value;

        const biblioteca =
            pegarBiblioteca();

        const musica = biblioteca.find(m =>
            m.nome.toLowerCase() ===
            nomeDigitado.toLowerCase()
        );

        if(musica){

            const bloco =
                e.target.closest(".music-block");

            bloco.querySelector(".autor").value =
                musica.autor;

            bloco.querySelector(".tom").value =
                musica.tom;

            bloco.querySelector(".youtubeLink").value =
                musica.youtube;

        }

    }

});

// ==========================
// CARREGAR AO ABRIR
// ==========================

atualizarDatalist();
// ======================
// REPERTÓRIOS AUTOMÁTICOS
// ======================

function pegarSlots(){
    return JSON.parse(
        localStorage.getItem("repertoriosSalvos")
    ) || [];
}

function salvarSlots(lista){
    localStorage.setItem(
        "repertoriosSalvos",
        JSON.stringify(lista)
    );
}

function salvarRepertorioAtual(){

    const repertorio = {
    grupo: document.getElementById("grupo").value,
    dia: document.getElementById("dia").value,
    extraTitulo: document.getElementById("extraTitulo").value,
    extraTexto: document.getElementById("extraTexto").value,

    primeira: coletarMusicas("primeiraInputs"),
    oferta: coletarMusicas("ofertaInputs"),
    entrega: coletarMusicas("entregaInputs"),
    distribuicao: coletarMusicas("distribuicaoInputs"),
    ceia: coletarMusicas("ceiaInputs")
};

    let slots = pegarSlots();

    slots.push(repertorio);

    // mantém apenas os últimos 5
if(slots.length > 5){
    slots.shift();
}

    salvarSlots(slots);
}
console.log("Salvou repertório");
function coletarMusicas(secao){

    const lista = [];

    document
    .querySelectorAll(`#${secao} .music-block`)
    .forEach(item => {

        lista.push({
            nome: item.querySelector(".nome").value,
            autor: item.querySelector(".autor").value,
            tom: item.querySelector(".tom").value,
            youtube: item.querySelector(".youtubeLink").value
        });

    });

    return lista;
}

function carregarSlot(indice){

    const slots = pegarSlots();

    if(!slots[indice]) return;

    const r = slots[indice];

    document.getElementById("grupo").value = r.grupo;
    document.getElementById("dia").value = r.dia;
    document.getElementById("extraTitulo").value = r.extraTitulo;
    document.getElementById("extraTexto").value = r.extraTexto;

    carregarMusicas("primeiraInputs", r.primeira);
carregarMusicas("ofertaInputs", r.oferta);
carregarMusicas("entregaInputs", r.entrega);
carregarMusicas("distribuicaoInputs", r.distribuicao || []);
carregarMusicas("ceiaInputs", r.ceia || []);

gerarCartaz();
}

function atualizarPoster(){

    const hoje = new Date();

    document.getElementById("posterGrupo").innerText =
        document.getElementById("grupo").value;

    document.getElementById("posterDia").innerText =
        document.getElementById("dia").value || hoje.getDate();

    document.getElementById("posterData").innerText =
        meses[hoje.getMonth()] + " " + hoje.getFullYear();

    gerarSecao(
        "primeiraInputs",
        "posterPrimeira",
        "secaoPrimeira"
    );

    gerarSecao(
        "ofertaInputs",
        "posterOferta",
        "secaoOferta"
    );

    gerarSecao(
        "entregaInputs",
        "posterEntrega",
        "secaoEntrega"
    );

    gerarSecao(
        "distribuicaoInputs",
        "posterDistribuicao",
        "secaoDistribuicao"
    );

    gerarSecao(
        "ceiaInputs",
        "posterCeia",
        "secaoCeia"
    );

    document.getElementById("posterExtraTitulo").innerText =
        document.getElementById("extraTitulo").value || "EXTRA";

    document.getElementById("posterExtraTexto").innerText =
        document.getElementById("extraTexto").value;

    document.getElementById("secaoExtra").style.display =
        (
            document.getElementById("extraTitulo").value.trim() ||
            document.getElementById("extraTexto").value.trim()
        )
        ? "block"
        : "none";
}
function carregarMusicas(secao, lista){

    const container =
        document.getElementById(secao);

    container.innerHTML = "";

    lista.forEach(m => {

        addMusica(secao);

        const ultimo =
            container.lastElementChild;

        ultimo.querySelector(".nome").value =
            m.nome || "";

        ultimo.querySelector(".autor").value =
            m.autor || "";

        ultimo.querySelector(".tom").value =
            m.tom || "";

        ultimo.querySelector(".youtubeLink").value =
            m.youtube || "";

    });

}

<button id="btnInstall" style="display:none;">📲 Instalar App</button>
<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block"; // mostra o botão
});

btnInstall.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Resultado da instalação:", outcome);
    deferredPrompt = null;
    btnInstall.style.display = "none";
  }
});

// Registrar o Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
